version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: autonomi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-autonomi}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-autonomi}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: ..
      dockerfile: infra/docker/api.Dockerfile
    container_name: autonomi-api
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - ../.env
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    container_name: autonomi-caddy
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - internal


networks:
  internal:

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
